# /etc/portage/make.conf

# Toolchain
COMMON_FLAGS="-O2 -march=native -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Build parallelism
# Ryzen 7 7735HS / 16 GiB RAM: fast by default, but without turning large builds
# into swap storms on a laptop.
MAKEOPTS="-j12 -l12"
NINJAFLAGS="-j12 -l12"

# Hardware
CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3 vpclmulqdq"
VIDEO_CARDS="amdgpu radeonsi"
INPUT_DEVICES="libinput"
LLVM_TARGETS="AMDGPU X86"
ABI_X86="64"

# Global defaults
USE="
  X
  alsa
  bluetooth
  dbus
  egl
  elogind
  kde
  nls
  networkmanager
  opengl
  pipewire
  plasma
  policykit
  pulseaudio
  qt6
  screencast
  sddm
  udev
  udisks
  vaapi
  vulkan
  wayland
  wifi
  xwayland
  -debug
  -doc
  -examples
  -gnome
  -static-libs
  -systemd
  -test
"

# Portage behavior
EMERGE_DEFAULT_OPTS="
  --jobs=2
  --load-average=12
  --complete-graph=y
  --keep-going=y
  --quiet-build=y
  --verbose-conflicts
  --with-bdeps=y
"

FEATURES="ccache clean-logs parallel-fetch parallel-install"
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="15G"
PORTAGE_NICENESS=15
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"

# Profile policy
LC_MESSAGES=C.UTF-8
ACCEPT_KEYWORDS="~amd64"
ACCEPT_LICENSE="*"
GRUB_PLATFORMS="efi-64"
